<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WutToDo</title>
    <link rel = "stylesheet" href = "main.css">
</head>
<body>
    <div class = "container">
        <div id = "Header">
            <h1>WutToDo</h1>
        </div>

        <div id = "task-box">
            <span>Total Tasks: <span id = "tot-count">0</span></span>
            <span>Remaining Tasks: <span id = "rem-count">0</span></span>
            <span>Completed Tasks: <span id = "comp-count">0</span></span>
            <div id = "input-group">
                <input id = "ip-box" placeholder="Enter task">
                <button id = "add_btn">Add</button>
            </div>
            <ul id = "task-list">
                
            </ul>
        </div>  
    </div>
    <script src="script.js"></script>
</body>

</html>
